# Render Blueprint - FastAPI 백엔드(api/) 배포 설정
# Render 대시보드에서 "New +" -> "Blueprint"로 이 저장소를 연결하면 이 파일을 자동으로 읽는다.
# sync: false인 항목은 Render가 값 입력을 요구한다(비밀값이라 여기 파일에는 안 넣음).

services:
  - type: web
    name: naengjango-hankki-v2-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: POSTGRES_URL
        sync: false
      - key: FOODSAFETY_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ADMIN_SECRET
        sync: false
