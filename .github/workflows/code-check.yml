name: 코드 점검 (자동)

# 이 파일이 하는 일: GitHub에 코드를 push하거나 PR을 올릴 때마다,
# GitHub가 무료로 제공하는 임시 컴퓨터(runner) 하나를 띄워서 코드를 세 단계로 점검한다.
#   1) 모든 .py 파일이 문법적으로 정상인가 (컴파일이 되는가)
#   2) import 안 된 이름을 쓰는 등 pyflakes가 잡아내는 명백한 버그가 있는가
#   3) tests/의 pytest가 실제로 API가 기대대로 동작하는지 검증한다 (2026-07-17 추가)
# pytest는 tests/fixtures/seed.sql로 매번 새로 만드는 임시 sqlite DB를 쓰고, 매 요청을
# FastAPI dependency override로 그 sqlite에 연결한다 - 그래서 POSTGRES_URL이나 .env,
# data/app.db(로컬 전용, gitignore됨) 없이도 GitHub 서버에서 그대로 돌아간다.

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      # 1) 저장소 코드를 runner로 가져온다
      - name: 코드 가져오기
        uses: actions/checkout@v4

      # 2) 파이썬 설치 (지수님 로컬 가상환경과 맞춰 3.12 사용)
      - name: 파이썬 3.12 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      # 3) requirements.txt에 적힌 라이브러리들을 설치한다
      #    (문법 검사기 자체는 라이브러리가 없어도 되지만, 프로젝트 파일들이
      #     import하는 패키지가 설치되어 있어야 다음 단계에서 정확히 점검된다)
      - name: 의존성 설치
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install flake8

      # 4) 문법 오류 점검: 모든 .py 파일이 정상적으로 컴파일되는지 확인
      #    (실제로 실행하는 게 아니라 "말이 되는 코드인지"만 확인하는 단계라 안전함)
      - name: 문법 오류 확인 (compileall)
        run: python -m compileall -q .

      # 5) 명백한 버그 점검: 정의 안 된 변수 사용, 잘못된 비교 연산 등
      #    (E9/F63/F7/F82만 선택 - 줄바꿈/공백 같은 스타일 지적은 일부러 끔,
      #     초보 개발자가 스타일 지적에 압도되지 않고 "진짜 버그"만 보게 하기 위함)
      - name: 명백한 버그 확인 (flake8)
        run: flake8 . --select=E9,F63,F7,F82 --show-source

      # 6) 기능 테스트: API가 실제로 기대대로 동작하는지 pytest로 확인
      - name: pytest 실행
        run: pytest tests/ -v
